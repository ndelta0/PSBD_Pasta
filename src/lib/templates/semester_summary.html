<!doctype html>
<html lang="pl">
<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1" name="viewport" />
	<title>Podsumowanie semestru - {{SEMESTER_NAME}}</title>
	<style>
      :root {
          color: #202020;
          background: #f4f4f1;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
          margin: 0;
          padding: 32px;
      }

      main {
          max-width: 920px;
          margin: 0 auto;
          background: #ffffff;
          border: 1px solid #dddddd;
          border-radius: 8px;
          padding: 32px;
      }

      header {
          display: flex;
          justify-content: space-between;
          gap: 24px;
          border-bottom: 1px solid #e2e2e2;
          padding-bottom: 20px;
      }

      h1 {
          margin: 0;
          font-size: 30px;
      }

      p {
          margin: 8px 0 0;
          color: #676767;
      }

      .status {
          display: inline-flex;
          align-items: center;
          height: 28px;
          border-radius: 999px;
          background: #e6f6ee;
          padding: 0 12px;
          color: #2a7a46;
          font-weight: 800;
      }

      .stats {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 12px;
          margin: 28px 0;
      }

      .stat {
          border: 1px solid #e0e0e0;
          border-radius: 8px;
          padding: 16px;
      }

      .stat strong,
      .stat span {
          display: block;
      }

      .stat strong {
          font-size: 26px;
      }

      .stat span {
          margin-top: 6px;
          color: #676767;
          font-size: 12px;
          font-weight: 800;
          text-transform: uppercase;
      }

      table {
          width: 100%;
          border-collapse: collapse;
      }

      th,
      td {
          border-bottom: 1px solid #e6e6e6;
          padding: 12px 10px;
          text-align: left;
      }

      th {
          color: #555555;
          font-size: 12px;
          text-transform: uppercase;
      }

      .actions {
          margin-top: 28px;
      }

      button {
          border: 0;
          border-radius: 6px;
          background: #2458ff;
          padding: 11px 16px;
          color: #ffffff;
          font: inherit;
          font-weight: 800;
          cursor: pointer;
      }

      @media print {
          body {
              background: #ffffff;
              padding: 0;
          }

          main {
              border: 0;
              padding: 0;
          }

          .actions {
              display: none;
          }
      }

      @media (max-width: 720px) {
          body {
              padding: 16px;
          }

          main {
              padding: 20px;
          }

          header,
          .stats {
              grid-template-columns: 1fr;
          }

          header {
              display: grid;
          }
      }
	</style>
</head>
<body>
<main>
	<header>
		<div>
			<h1>{{SEMESTER_NAME}}</h1>
			<p>Podsumowanie semestru wygenerowane {{GENERATED_AT}} przez PASTA.</p>
		</div>
		<span class="status">{{SEMESTER_STATUS}}</span>
	</header>

	<section aria-label="Statystyki semestru" class="stats">
		<div class="stat">
			<strong>{{GRADE_AVG}}</strong>
			<span>Średnia</span>
		</div>
		<div class="stat">
			<strong>{{ATTENDANCE_PCT}}%</strong>
			<span>Frekwencja</span>
		</div>
		<div class="stat">
			<strong>{{ECTS}}</strong>
			<span>ECTS</span>
		</div>
	</section>

	<section aria-labelledby="subjects-title">
		<h2 id="subjects-title">Przedmioty</h2>
		<table>
			<thead>
			<tr>
				<th>Przedmiot</th>
				<th>Ocena</th>
				<th>Frekwencja</th>
			</tr>
			</thead>
			<tbody>{{SUBJECT_ROWS}}</tbody>
		</table>
	</section>

	<div class="actions">
		<button onclick="window.print()" type="button">Drukuj / zapisz PDF</button>
	</div>
</main>
</body>
</html>
